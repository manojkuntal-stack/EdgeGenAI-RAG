<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeGenAI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #123b6d, #07111f 55%, #020617);
            color: white;
            overflow: hidden;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 18px;
        }

        .header {
            text-align: center;
            padding: 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 50px rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 18px;
        }

        .header h1 {
            font-size: 30px;
            color: #38e8ff;
            text-shadow: 0 0 18px #00eaff;
        }

        .header p {
            margin-top: 8px;
            font-size: 13px;
            color: #b6eaff;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .message {
            max-width: 85%;
            padding: 14px 16px;
            margin: 12px 0;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
            animation: pop 0.25s ease;
            word-wrap: break-word;
        }

        .bot {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            border-bottom-left-radius: 5px;
        }

        .user {
            margin-left: auto;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            box-shadow: 0 12px 35px rgba(6, 182, 212, 0.35);
            border-bottom-right-radius: 5px;
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .input-card {
            padding: 14px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.35);
        }

        textarea {
            width: 100%;
            min-height: 55px;
            max-height: 130px;
            resize: none;
            outline: none;
            border: none;
            border-radius: 18px;
            padding: 16px;
            font-size: 16px;
            color: white;
            background: rgba(15, 23, 42, 0.9);
            margin-bottom: 12px;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #06b6d4, #2563eb, #7c3aed);
            box-shadow: 0 12px 35px rgba(37, 99, 235, 0.45);
            cursor: pointer;
        }

        button:active {
            transform: scale(0.97);
        }

        .status {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(34, 197, 94, 0.18);
            color: #86efac;
            font-size: 12px;
            border: 1px solid rgba(34, 197, 94, 0.35);
        }

        .typing {
            color: #67e8f9;
        }

        .glow {
            position: fixed;
            width: 260px;
            height: 260px;
            background: #06b6d4;
            filter: blur(120px);
            opacity: 0.25;
            border-radius: 50%;
            z-index: -1;
        }

        .glow.one {
            top: -80px;
            left: -80px;
        }

        .glow.two {
            bottom: -80px;
            right: -80px;
            background: #7c3aed;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 12px;

            filter:
                drop-shadow(0 0 25px #00eaff) drop-shadow(0 0 45px #2563eb);

            animation: floatLogo 3s ease-in-out infinite;
        }

        @keyframes floatLogo {

            0% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-8px) scale(1.03);
            }

            100% {
                transform: translateY(0px) scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="glow one"></div>
    <div class="glow two"></div>

    <div class="app">

        <div class="header">
            <div class="logo-container">

                <img src="logo.png" class="logo">

                <h1>EdgeGenAI</h1>

            </div>
            <p>Your Smart AI Assistant</p>
            <div class="status">● Backend Connected</div>
        </div>

        <div id="chat" class="chat-box">
            <div class="message bot">
                Hello 👋<br><br>
                I am your EdgeGenAI assistant.<br>
                Ask me anything.
            </div>
        </div>

        <div class="input-card">
            <textarea id="input" placeholder="Type your question here..."></textarea>
            <button onclick="sendMessage()">SEND MESSAGE</button>
        </div>

    </div>
    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("input");

        const API_URL = "http://10.212.153.200:5000/chat";

        let offlineReady = false;

        function addMessage(text, type) {

            const div = document.createElement("div");

            div.className = "message " + type;

            div.innerHTML = text.replace(/\n/g, "<br>");

            chat.appendChild(div);

            chat.scrollTop = chat.scrollHeight;
        }

        function removeLoading() {

            const loading = document.getElementById("loading");

            if (loading) loading.remove();
        }

        function initOfflineModel() {

            try {

                if (typeof AndroidBridge !== "undefined") {

                    addMessage("⚡ Loading offline AI model...", "bot");

                    const result = AndroidBridge.loadOfflineModel();

                    addMessage(result, "bot");

                    if (result.includes("successfully")) {
                        offlineReady = true;
                    }

                } else {

                    addMessage("❌ AndroidBridge not found.", "bot");
                }

            } catch (e) {

                addMessage("❌ Offline model failed: " + e.message, "bot");
            }
        }

        async function sendMessage() {

            const text = input.value.trim();

            if (!text) return;

            addMessage(text, "user");

            input.value = "";

            const loading = document.createElement("div");

            loading.className = "message bot typing";

            loading.id = "loading";

            loading.innerHTML = "⏳ Generating answer...";

            chat.appendChild(loading);

            chat.scrollTop = chat.scrollHeight;

            try {

                // ---------------- ONLINE BACKEND ----------------

                const response = await fetch(API_URL, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json",
                        "X-App-Secret": "manoj_edgegenai_12345"
                    },

                    body: JSON.stringify({
                        query: text
                    })
                });

                const data = await response.json();

                removeLoading();

                addMessage("🌐 " + (data.response || "No response"), "bot");

            } catch (error) {

                console.log(error);

                // ---------------- OFFLINE FALLBACK ----------------

                try {

                    if (
                        typeof AndroidBridge !== "undefined"
                        && offlineReady
                    ) {

                        const result =
                            AndroidBridge.askOffline(text);

                        removeLoading();

                        addMessage("📱 " + result, "bot");

                    } else {

                        removeLoading();

                        addMessage(
                            "❌ Backend and offline model both unavailable.",
                            "bot"
                        );
                    }

                } catch (e) {

                    removeLoading();

                    addMessage(
                        "❌ Offline AI failed: " + e.message,
                        "bot"
                    );
                }
            }
        }

        input.addEventListener("keydown", function (e) {

            if (e.key === "Enter" && !e.shiftKey) {

                e.preventDefault();

                sendMessage();
            }
        });

        window.onload = function () {

            initOfflineModel();
        };
    </script>
</body>

</html>
